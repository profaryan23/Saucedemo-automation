[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --tb=short --strict-markers

markers =
    smoke: Smoke tests
    regression: Regression tests
    login: Login tests
    inventory: Inventory tests
    cart: Cart tests
    checkout: Checkout tests

timeout = 300
log_cli = false
log_file = logs/test_run.log
